version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: gigshield-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: gigshield
    volumes:
      - mongo_data:/data/db
    networks:
      - gigshield-net

  redis:
    image: redis:7.2-alpine
    container_name: gigshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASS} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - gigshield-net

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigshield-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - gigshield-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── ML Service ───────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: gigshield-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models/saved
    networks:
      - gigshield-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigshield-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    networks:
      - gigshield-net

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: gigshield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - ml-service
    networks:
      - gigshield-net

volumes:
  mongo_data:
  redis_data:
  ml_models:

networks:
  gigshield-net:
    driver: bridge
